<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
</head>
<body style="margin:0; height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#004792,#0077cc); font-family:Arial, sans-serif;">

  <div style="background:white; padding:40px; border-radius:14px; box-shadow:0 10px 30px rgba(0,0,0,0.2); text-align:center; width:350px;">

    <h2 style="margin-bottom:20px; color:#004792;">
      Verifying Subscription...
    </h2>

    <p id="expiryInfo" 
       style="font-size:16px; color:#333; margin-bottom:25px; font-weight:500;">
    </p>

    <!-- Loading Animation -->
    <div style="display:flex; justify-content:center; align-items:center;">
      <div style="
        width:40px;
        height:40px;
        border:4px solid #e0e0e0;
        border-top:4px solid #004792;
        border-radius:50%;
        animation:spin 1s linear infinite;">
      </div>
    </div>

  </div>

  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqVGxE6pQa8aWI4qHRpl93u7SdViKoaEc",
  authDomain: "login-setup-2230f.firebaseapp.com",
  projectId: "login-setup-2230f",
  storageBucket: "login-setup-2230f.firebasestorage.app",
  messagingSenderId: "764529433359",
  appId: "1:764529433359:web:490674f6f7a045f092bc7a",
  measurementId: "G-8B2S3PV42R"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🎯 STEP 1 — Handle payment success FIRST
const params = new URLSearchParams(window.location.search);
const status = params.get("status");
const duration = params.get("days");

if (status === "SUCCESS" && duration) {

    const oldExpiry = localStorage.getItem("subscriptionExpiry");
    let baseDate = new Date();

    // If user already has active subscription, extend it
    if (oldExpiry && new Date(oldExpiry) > new Date()) {
        baseDate = new Date(oldExpiry);
    }

    baseDate.setDate(baseDate.getDate() + parseInt(duration));

    localStorage.setItem("subscriptionExpiry", baseDate.toISOString());

    // Clean URL so refresh doesn’t re-add days
    window.history.replaceState({}, document.title, "temp-dash.html");

    alert("Subscription Activated 🎉");
}

// 🔐 STEP 2 — Now protect dashboard
onAuthStateChanged(auth, (user) => {

  if (!user) {
      window.location.href = "index.html";
      return;
  }

  const expiry = localStorage.getItem("subscriptionExpiry");

  if (!expiry) {
      window.location.href = "payment.html";
      return;
  }

  const expiryDate = new Date(expiry);

  if (Date.now() > expiryDate.getTime()) {
      window.location.href = "payment.html";
      return;
  }

  document.getElementById("expiryInfo").innerText =
      "Subscription valid until: " + expiryDate.toDateString();
  window.location.href = "https://app.statusly.in";
});

</script>
